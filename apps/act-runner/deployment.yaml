apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: act-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        # Register the runner on first start (no-op if already registered)
        - name: register
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/config.yaml ]; then
                forgejo-runner generate-config > /data/config.yaml
              fi
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --no-interactive \
                  --instance http://forgejo-http.forgejo.svc.cluster.local:3000 \
                  --token "$REGISTRATION_TOKEN" \
                  --name homelab-runner \
                  --labels self-hosted,linux,amd64 \
                  --config /data/config.yaml
              fi
          env:
            - name: REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: act-runner-secret
                  key: REGISTRATION_TOKEN
          volumeMounts:
            - name: runner-data
              mountPath: /data

      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          command: ["forgejo-runner", "daemon", "--config", "/data/config.yaml"]
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: runner-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

        # Docker-in-Docker sidecar for building images
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "4Gi"
              cpu: "2000m"

      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: act-runner-data
        - name: docker-storage
          emptyDir: {}
