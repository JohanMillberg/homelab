apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-values
  namespace: n8n
data:
  values.yaml: |
    main:
      image:
        repository: n8nio/n8n
        pullPolicy: IfNotPresent
        tag: "2.11.2"
      config:
        n8n:
          hide_usage_page: true
          proxy_hops: 1

      extraEnv:
        N8N_SECURE_COOKIE:
          value: "false"
        N8N_EDITOR_BASE_URL:
          value: "http://n8n.lan"
        N8N_DIAGNOSTICS_ENABLED:
          value: "false"
        N8N_PORT:
          value: "5678"
        N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
          value: "true"

      persistence:
        enabled: true
        type: dynamic
        storageClass: longhorn
        size: 5Gi
        accessModes:
          - ReadWriteOnce

    resources:
      limits:
        memory: 2048Mi
      requests:
        memory: 512Mi

    ingress:
      enabled: true
      hosts:
        - host: n8n.lan
          paths:
            - path: /
              pathType: Prefix