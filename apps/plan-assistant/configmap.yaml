apiVersion: v1
kind: ConfigMap
metadata:
  name: plan-assistant-config
  namespace: plan-assistant
data:
  # DATABASE_URL is intentionally omitted here — the full URL (with password) is in the SealedSecret
  CORS_ORIGINS: "http://plan-assistant.lan"
  OAUTH_REDIRECT_URI: "http://plan-assistant.lan/api/auth/callback"
