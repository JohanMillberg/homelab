apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: pihole
spec:
  interval: 1h
  chart:
    spec:
      chart: pihole
      version: "2.35.0"
      sourceRef:
        kind: HelmRepository
        name: mojo2600
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  values:
    admin:
      existingSecret: pihole-admin
      passwordKey: password

    DNS1: "1.1.1.1"
    DNS2: "1.0.0.1"

    podDnsConfig:
      enabled: true
      policy: "None"
      nameservers:
        - 127.0.0.1
        - 1.1.1.1

    persistentVolumeClaim:
      enabled: true
      size: 500Mi

    serviceDns:
      type: LoadBalancer
      mixedService: true    # single service for both TCP + UDP port 53

    serviceWeb:
      type: LoadBalancer

    serviceDhcp:
      enabled: false

    dnsmasq:
      customDnsEntries: []
      customCnameEntries: []